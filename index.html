<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="bg-gradient-to-r from-[#667EEA] to-[#764BA2]">
   

    <div class="flex justify-center items-center min-h-screen">
        <form class="flex flex-col items-center gap-7 bg-[#E6E6E6] py-14 px-16 rounded-2xl">
            <p class="font-bold text-[25px] text-[#333]">Register</p>
            <input class="border-[1px] border-solid border-[#888] rounded-xl py-3 pl-4 pr-44 outline-none" type="text" id="username" placeholder="Username">
            <input class="border-[1px] border-solid border-[#888] rounded-xl py-3 pl-4 pr-44 outline-none" type="text" id="password" placeholder="Password">
            <button class="py-3 p-40 bg-[#667EEA] text-white rounded-xl cursor-pointer" id="btnRegister">Register</button>
        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="index.js"></script>
</body>
</html>
